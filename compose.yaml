

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: 123
      POSTGRES_USER: postgres
      POSTGRES_DB: TesteLazaro
    ports:
      - "5433:5432"
    volumes:
      - ./script.sql:/docker-entrypoint-initdb.d/script.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TesteLazaro"]
      interval: 5s
      timeout: 5s
      retries: 20
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/TesteLazaro
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=123
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/TesteFrontENd
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
